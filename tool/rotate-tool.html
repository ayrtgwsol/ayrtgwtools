<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotation Vector Alignment Framework</title>
    <style>
        /* Consistent Global Brand Color Palette */
        :root {
            --brand-color: #0052cc;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(0, 82, 204, 0.15);
            --glass-shadow: rgba(0, 82, 204, 0.08);
            --card-bg: rgba(255, 255, 255, 0.65);
        }

        /* Support Dark Mode variables automatically if the parent frame uses it */
        [data-theme="dark"] {
            --glass-bg: rgba(10, 15, 30, 0.45);
            --glass-border: rgba(0, 82, 204, 0.3);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --card-bg: rgba(15, 23, 42, 0.65);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--brand-color);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: transparent; /* Seamless blend inside main page iframe */
            padding: 2rem;
            overflow: hidden;
        }

        /* Glassmorphic Interaction Container Module */
        .workspace-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-shadow: 0 12px 40px var(--glass-shadow);
        }

        .tool-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .tool-instructions {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        /* Coordinate System Bounds Matrix */
        .canvas-area {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Constrained Vector Boundary Track */
        .orbital-track {
            position: relative;
            width: 260px;
            height: 260px;
            border: 2px dashed var(--brand-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.85;
            transition: border-color 0.3s ease;
        }

        /* Fixed Anchor Origin Point */
        .center-axis {
            width: 8px;
            height: 8px;
            background-color: var(--brand-color);
            border-radius: 50%;
            position: absolute;
            z-index: 10;
        }

        /* Target Orbital Constrained Ball Node */
        .rotating-ball {
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: var(--brand-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            /* Offset margins exactly to ensure perfectly balanced rotational calculations */
            margin-top: -12px;
            margin-left: -12px;
            transform: translate(0px, 0px);
            will-change: transform;
            z-index: 5;
            box-shadow: 0 0 15px rgba(0, 82, 204, 0.4);
        }

        /* Mathematical Vector Connection Line UI */
        .vector-line {
            position: absolute;
            top: 50%;
            left: 50%;
            height: 1.5px;
            background-color: var(--brand-color);
            opacity: 0.25;
            transform-origin: 0 50%;
            width: 0px;
            z-index: 1;
            pointer-events: none;
        }

        /* Metrics Telemetry Overlay */
        .telemetry-dashboard {
            margin-top: 2.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-tile {
            background: rgba(0, 82, 204, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.6rem;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="workspace-card">
        <h3 class="tool-title">Rotation Vector Anchor</h3>
        <p class="tool-instructions">Move cursor inside grid matrix to verify collinear structural trajectory.</p>

        <div class="canvas-area" id="canvasFrame">
            <div class="orbital-track">
                <div class="center-axis"></div>
                <div class="vector-line" id="vectorLine"></div>
                <div class="rotating-ball" id="trackingBall"></div>
            </div>
        </div>

        <div class="telemetry-dashboard">
            <div class="metric-tile">Angle: <span id="telemetryAngle">0°</span></div>
            <div class="metric-tile">Alignment: <span id="telemetryStatus">Collinear</span></div>
        </div>
    </div>

    <script>
        const canvasFrame = document.getElementById('canvasFrame');
        const trackingBall = document.getElementById('trackingBall');
        const vectorLine = document.getElementById('vectorLine');
        const telemetryAngle = document.getElementById('telemetryAngle');

        // Radius configuration matching exactly half of the track size (260px / 2 = 130px)
        const ORBITAL_RADIUS = 130; 

        function executeVectorReorientation(pointerX, pointerY) {
            const rect = canvasFrame.getBoundingClientRect();
            
            // Derive absolute coordinates for mathematical true center axis point of the structure
            const centerX = rect.left + (rect.width / 2);
            const centerY = rect.top + (rect.height / 2);

            // Compute delta offsets relative to source center
            const deltaX = pointerX - centerX;
            const deltaY = pointerY - centerY;

            // Generate directional radiant angle from structural core
            const radians = Math.atan2(deltaY, deltaX);
            const degrees = radians * (180 / Math.PI);

            // Force ball node constraints strictly onto perimeter radius boundaries
            const targetX = Math.cos(radians) * ORBITAL_RADIUS;
            const targetY = Math.sin(radians) * ORBITAL_RADIUS;

            // Apply modern localized hardware translation vectors
            trackingBall.style.transform = `translate(${targetX}px, ${targetY}px)`;

            // Dynamically project rendering guideline to verify alignment matrix integrity
            const absoluteDistance = Math.hypot(deltaX, deltaY);
            vectorLine.style.transform = `rotate(${degrees}deg)`;
            vectorLine.style.width = `${absoluteDistance}px`;

            // Process telemetry readouts visually for interface feedback
            let displayDegrees = Math.round(degrees);
            if (displayDegrees < 0) displayDegrees += 360; 
            telemetryAngle.textContent = `${displayDegrees}°`;
        }

        // Mouse Engine Events
        window.addEventListener('mousemove', (e) => {
            executeVectorReorientation(e.clientX, e.clientY);
        });

        // Touch Interface Native Integration Layer
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                executeVectorReorientation(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, { passive: true });

        // Synchronize dark theme attributes automatically with structural parent document instances
        if (window.parent && window.parent.document) {
            const syncThemeEngine = () => {
                const parentThemeSetting = window.parent.document.documentElement.getAttribute('data-theme');
                if (parentThemeSetting) {
                    document.documentElement.setAttribute('data-theme', parentThemeSetting);
                }
            };
            
            // Initialize adjustments and set up long polling listeners for real-time adjustments
            syncThemeEngine();
            setInterval(syncThemeEngine, 1000);
        }
    </script>
</body>
</html>
