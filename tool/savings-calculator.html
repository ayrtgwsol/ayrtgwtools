<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Calculator</title>
    <style>
        :root {
            --brand-blue: #0052cc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-card: rgba(255, 255, 255, 0.4);
            --text-color: #1e293b;
        }
        [data-theme="dark"] {
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-card: rgba(15, 23, 42, 0.4);
            --text-color: #f1f5f9;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: var(--glass-bg);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .calc-card {
            background: var(--glass-card);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { margin-bottom: 1.5rem; text-align: center; }

        .input-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid rgba(0,82,204,0.2);
            background: rgba(255,255,255,0.8);
        }

        button {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: var(--brand-blue);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        #results {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0,0,0,0.1);
        }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Savings Goal</h2>
    <div class="input-group">
        <label>Initial Deposit ($)</label>
        <input type="number" id="principal" value="1000">
    </div>
    <div class="input-group">
        <label>Monthly Contribution ($)</label>
        <input type="number" id="monthly" value="200">
    </div>
    <div class="input-group">
        <label>Annual Interest Rate (%)</label>
        <input type="number" id="rate" value="5">
    </div>
    <div class="input-group">
        <label>Years to Grow</label>
        <input type="number" id="years" value="10">
    </div>
    <button onclick="calculate()">Calculate Growth</button>

    <div id="results">
        <div class="result-row"><span>Total Principal:</span> <strong id="res-principal">$0</strong></div>
        <div class="result-row"><span>Total Interest:</span> <strong id="res-interest">$0</strong></div>
        <div class="result-row" style="font-size: 1.2rem; margin-top: 10px;"><span>Future Balance:</span> <strong id="res-total">$0</strong></div>
    </div>
</div>

<script>
    function calculate() {
        const P = parseFloat(document.getElementById('principal').value) || 0;
        const PMT = parseFloat(document.getElementById('monthly').value) || 0;
        const r = (parseFloat(document.getElementById('rate').value) || 0) / 100 / 12;
        const t = parseFloat(document.getElementById('years').value) || 0;
        const n = t * 12;

        let futureValue = P * Math.pow(1 + r, n) + PMT * ((Math.pow(1 + r, n) - 1) / r);
        const totalPrincipal = P + (PMT * n);
        const totalInterest = futureValue - totalPrincipal;

        document.getElementById('res-principal').textContent = '$' + totalPrincipal.toFixed(2);
        document.getElementById('res-interest').textContent = '$' + totalInterest.toFixed(2);
        document.getElementById('res-total').textContent = '$' + futureValue.toFixed(2);
    }
</script>
</body>
</html>
