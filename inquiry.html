<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="./background/icon.png">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AYR TGW Solutions | Rapid Inquiry</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>

/* ── BACKGROUND STACK ── */
.bg-stack{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-stack .bg-img{position:absolute;inset:0;background-image:url('./background/Background-Desktop.png');background-size:cover;background-position:center top;background-repeat:no-repeat;opacity:.50;}
.bg-stack .bg-overlay{position:absolute;inset:0;background-image:url('./background/Overlay-Dark-Desktop.png');background-size:cover;background-position:center;background-repeat:no-repeat;opacity:.85;}
.glow-bloom{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle at 50% 0%,rgba(30,64,175,0.18) 0%,rgba(3,7,18,0) 65%);}
@media(max-width:767px){
  .bg-stack .bg-img{background-image:url('./background/Background-Mobile.png');}
  .bg-stack .bg-overlay{background-image:url('./background/Overlay-Dark-Mobile.png');}
}
/* ── PREMIUM HAMBURGER + DRAWER ── */
.site-logo-img{height:48px;width:auto;object-fit:contain;display:block;}
.hamburger-btn{display:flex;flex-direction:column;justify-content:center;gap:5px;width:40px;height:40px;background:transparent;border:1px solid rgba(55,65,81,.60);border-radius:8px;cursor:pointer;padding:8px;transition:border-color .2s;}
.hamburger-btn:hover{border-color:#004aad;}
.hamburger-btn span{display:block;height:1.5px;background:#9ca3af;border-radius:2px;transition:all .25s;}
.hamburger-btn.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.hamburger-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.hamburger-btn.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
.mobile-drawer{position:fixed;top:0;right:0;width:280px;height:100vh;background:#020917;border-left:1px solid rgba(55,65,81,.65);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);z-index:200;display:flex;flex-direction:column;}
.mobile-drawer.open{transform:translateX(0);}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid rgba(55,65,81,.45);}
.drawer-head img{height:36px;width:auto;}
.drawer-close{background:none;border:none;color:#6b7280;font-size:1.5rem;cursor:pointer;line-height:1;padding:2px 6px;transition:color .2s;}
.drawer-close:hover{color:#f3f4f6;}
.drawer-links{display:flex;flex-direction:column;padding:10px 0;flex:1;overflow-y:auto;}
.drawer-links a{padding:13px 24px;color:#9ca3af;font-size:.9375rem;font-weight:500;text-decoration:none;letter-spacing:.03em;border-left:3px solid transparent;transition:all .18s;}
.drawer-links a:hover{color:#f3f4f6;background:rgba(43,91,208,.06);border-left-color:#004aad;}
.drawer-links a.active{color:#004aad;border-left-color:#004aad;background:rgba(43,91,208,.06);}
.drawer-overlay{display:none;position:fixed;inset:0;background:rgba(3,7,18,.55);z-index:199;backdrop-filter:blur(2px);}
.drawer-overlay.open{display:block;}

body{font-family:'Inter',sans-serif;background-color:#030712;color:#f3f4f6;}
.nav-active{color:#60a5fa !important;}
.panel{background:rgba(3,7,18,0.40);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(55,65,81,0.80);border-radius:12px;padding:28px;}
.panel-title{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#60a5fa;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.panel-title::before{content:'';display:block;width:3px;height:14px;background:#3b82f6;border-radius:2px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:.68rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#6b7280;}
.fg label .req{color:#60a5fa;}
.fg input,.fg select,.fg textarea{background:rgba(17,24,39,.60);border:1px solid rgba(55,65,81,.80);border-radius:8px;color:#f3f4f6;font-family:inherit;font-size:.875rem;padding:9px 13px;transition:border-color .2s,box-shadow .2s;width:100%;outline:none;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.15);}
.fg input::placeholder,.fg textarea::placeholder{color:rgba(255,255,255,.18);}
.fg select option{background:#0a0f1e;color:#f3f4f6;}
.fg textarea{resize:vertical;min-height:110px;}
/* priority buttons */
.em-btn{padding:7px 16px;border-radius:6px;border:1px solid rgba(55,65,81,.80);background:transparent;color:#9ca3af;font-family:inherit;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:.04em;}
.em-btn:hover{border-color:#3b82f6;color:#f3f4f6;}
.em-btn.low.sel{border-color:#22c55e;background:rgba(34,197,94,.08);color:#22c55e;}
.em-btn.medium.sel{border-color:#f59e0b;background:rgba(245,158,11,.08);color:#f59e0b;}
.em-btn.high.sel{border-color:#ef4444;background:rgba(239,68,68,.08);color:#ef4444;}
/* checkbox */
.cb-row{display:flex;align-items:flex-start;gap:9px;margin-top:8px;}
.cb-row input[type=checkbox]{width:15px;height:15px;flex-shrink:0;accent-color:#3b82f6;margin-top:3px;}
.cb-row label{font-size:.83rem;color:#9ca3af;line-height:1.5;font-weight:400;}
.toast{position:fixed;bottom:24px;right:24px;background:rgba(3,7,18,.95);border:1px solid rgba(55,65,81,.80);border-radius:10px;padding:13px 18px;font-size:.875rem;max-width:320px;transform:translateY(80px);opacity:0;transition:all .35s;z-index:999;backdrop-filter:blur(8px);}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:#22c55e;color:#22c55e;}
.toast.error{border-color:#ef4444;color:#ef4444;}
@media(max-width:640px){.field-grid{grid-template-columns:1fr !important;}}

@font-face{font-family:'YD Yoonche Bold';src:local('YD Yoonche Bold'),local('YDYooncheB');font-weight:700;}
:root{--brand:#004aad;--brand-rgb:0,74,173;}
body{font-family:'YD Yoonche Bold','Inter',system-ui,sans-serif!important;}
html.light-mode body{background-color:#eef2ff!important;color:#000000!important;}
html.light-mode .bg-stack .bg-img{opacity:.12!important;}
html.light-mode .bg-stack .bg-overlay{opacity:.28!important;}

/* Ensure all nav uses brand color */
.dnav-link::after{background:var(--brand)!important;}
.dnav-link.active{color:var(--brand)!important;}
.dnav-link:hover::after,.dnav-link.active::after{width:100%!important;}
.drawer-links-a:hover{background:rgba(0,74,173,.06)!important;border-left-color:var(--brand)!important;}
.drawer-links-a.active{color:var(--brand)!important;border-left-color:var(--brand)!important;background:rgba(0,74,173,.06)!important;}
/* SVG icons brand color */
.p-icon svg,.p-icon-svg{stroke:#004aad!important;color:#004aad!important;}
svg[class*="w-"]{stroke:#004aad!important;}
/* Panels light mode */
html.light-mode .panel{background:rgba(255,255,255,.78)!important;border-color:rgba(0,74,173,.18)!important;}
html.light-mode .fg label{color:#4b5563!important;}
html.light-mode .fg input,html.light-mode .fg select,html.light-mode .fg textarea{background:rgba(238,242,255,.85)!important;border-color:rgba(0,74,173,.25)!important;color:#000000!important;}
/* Theme toggle */
.theme-toggle{position:fixed;bottom:26px;right:26px;z-index:300;width:50px;height:50px;border-radius:50%;background:rgba(0,74,173,.90);border:2px solid rgba(0,74,173,.55);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,74,173,.40);transition:all .3s;backdrop-filter:blur(12px);}
.theme-toggle:hover{background:var(--brand);transform:scale(1.08);}
.theme-toggle svg{width:22px;height:22px;fill:none;stroke:#ffffff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.theme-toggle .icon-moon{display:block;}
.theme-toggle .icon-sun{display:none;}
html.light-mode .theme-toggle .icon-moon{display:none;}
html.light-mode .theme-toggle .icon-sun{display:block;}
/* All glow colors to brand */
.glow-bloom{background:radial-gradient(circle at 50% 0%,rgba(0,74,173,.22) 0%,rgba(3,7,18,0) 65%)!important;}
/* Step dots */
.step.active .step-dot{border-color:#004aad!important;background:#004aad!important;}
.step.done .step-dot{border-color:#004aad!important;color:#004aad!important;background:rgba(0,74,173,.08)!important;}
.step-prog-fill{background:#004aad!important;}
.step.active .step-lbl,.step.done .step-lbl{color:#004aad!important;}
/* Portal card hover border */
.portal-card:hover{border-color:rgba(0,74,173,.60)!important;}
/* Light mode text */
html.light-mode .text-gray-400{color:#374151!important;}
html.light-mode .text-gray-500{color:#6b7280!important;}
html.light-mode main h1{color:#000000;}


/* ═══ FLOATING HEADER LAYOUT (all pages) ═══ */
.site-header-wrap{position:fixed!important;top:14px;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:1240px;z-index:50;}
.site-header{background:rgba(3,7,18,0.72)!important;backdrop-filter:blur(20px)!important;-webkit-backdrop-filter:blur(20px)!important;border:1px solid rgba(0,74,173,.42)!important;border-radius:20px!important;box-shadow:0 8px 32px rgba(0,0,0,.38),0 0 0 1px rgba(0,74,173,.10)!important;position:static!important;top:auto!important;}
html.light-mode .site-header{background:rgba(238,242,255,0.90)!important;border-color:rgba(0,74,173,.28)!important;box-shadow:0 8px 32px rgba(0,74,173,.12)!important;}
.header-inner{padding:0 22px;height:66px;display:flex!important;align-items:center!important;justify-content:space-between!important;}
.header-spacer{height:96px;}
/* Logo */
.site-logo{display:inline-flex!important;align-items:center;text-decoration:none;flex-shrink:0;}
.site-logo img,.site-logo-img{height:42px;width:auto;object-fit:contain;display:block;}
/* Desktop nav */
#desktopNavList{display:none;align-items:center;gap:20px;list-style:none;margin:0;padding:0;}
@media(min-width:768px){
  #desktopNavList{display:flex!important;}
  #hamburgerBtn2{display:none!important;}
}
.dnav-link{font-size:.78rem;font-weight:700;color:#9ca3af;text-decoration:none;letter-spacing:.04em;transition:color .2s;position:relative;padding-bottom:3px;font-family:inherit;}
.dnav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:#004aad;transition:width .2s;}
.dnav-link:hover{color:#ffffff;}
html.light-mode .dnav-link{color:#6b7280;}
html.light-mode .dnav-link:hover{color:#000000;}
.dnav-link:hover::after,.dnav-link.active::after{width:100%;}
.dnav-link.active{color:#004aad;}
/* Hamburger */
.hamburger-btn{display:flex;flex-direction:column;justify-content:center;gap:5px;width:40px;height:40px;background:transparent;border:1px solid rgba(55,65,81,.65);border-radius:8px;cursor:pointer;padding:8px;transition:border-color .2s;flex-shrink:0;}
.hamburger-btn:hover{border-color:#004aad;}
.hamburger-btn span{display:block;height:1.5px;background:#9ca3af;border-radius:2px;transition:all .25s;}
.hamburger-btn.open span:nth-child(1){transform:translateY(6.5px) rotate(45deg);}
.hamburger-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.hamburger-btn.open span:nth-child(3){transform:translateY(-6.5px) rotate(-45deg);}
/* ─────────────────────────────────────────── */



</style>

</head>
<body class="relative min-h-screen overflow-x-hidden">



<!-- BACKGROUND STACK -->
<div class="bg-stack" id="bgStack">
  <div class="bg-img"></div>
  <div class="bg-overlay"></div>
</div>
<div class="glow-bloom"></div>


<!-- FLOATING HEADER -->
<div class="site-header-wrap">
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="site-logo">
        <img src="./background/icon.png" alt="AYR TGW Tools Hub" class="site-logo-img" onerror="this.src='./Logo2.png'">
      </a>
      <ul style="list-style:none;margin:0;padding:0;" id="desktopNavList">
      <li><a href="index.html" class="dnav-link">Home</a></li>
      <li><a href="clients.html" class="dnav-link">Client</a></li>
      <li><a href="partners.html" class="dnav-link">Partner</a></li>
      <li><a href="feedback.html" class="dnav-link">Feedback</a></li>
      <li><a href="inquiry.html" class="dnav-link active" aria-current="page">Inquiry</a></li>
      </ul>
      <button class="hamburger-btn" id="hamburgerBtn2" aria-label="Open navigation menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>
</div>
<div class="header-spacer"></div>

<!-- MOBILE DRAWER -->
<div class="drawer-overlay" id="drawerOverlay2"></div>
<nav class="mobile-drawer" id="mobileDrawer2" aria-label="Mobile navigation">
  <div class="drawer-head">
    <img src="./background/icon.png" alt="AYR TGW Tools Hub" onerror="this.src='./Logo2.png'">
    <button class="drawer-close" id="drawerClose2" aria-label="Close menu">&#x2715;</button>
  </div>
  <div class="drawer-links">
    <a href="index.html" class="drawer-links-a">Home</a>
    <a href="clients.html" class="drawer-links-a">Client</a>
    <a href="partners.html" class="drawer-links-a">Partner</a>
    <a href="feedback.html" class="drawer-links-a">Feedback</a>
    <a href="inquiry.html" class="drawer-links-a active" aria-current="page">Inquiry</a>
  </div>
</nav>
<style>
@media(min-width:768px){#desktopNavList{display:flex!important;}#hamburgerBtn2{display:none!important;}}
</style>


<main class="max-w-3xl mx-auto px-6 py-14 relative z-10">
  <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-white via-gray-200 to-gray-500 bg-clip-text text-transparent mb-2">Rapid Inquiry</h1>
  <p class="text-gray-400 text-base mb-8 leading-relaxed max-w-xl">Lead response and validation. Emergency level triage and agent routing.</p>

  <div style="width:100%;max-width:740px;margin:0 auto;">
    <iframe
      src="https://docs.google.com/forms/d/e/1FAIpQLSfPZaIAbUf62laRZN7ZMal6EtQ-tkhskFDYEyEIr5dJOt1iwg/viewform?usp=header"
      width="100%"
      height="900"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      style="border-radius:12px;border:1px solid rgba(55,65,81,0.6);display:block;"
      loading="lazy"
    >Loading form…</iframe>
  </div>
</main>

<div class="toast" id="toast"></div>


<script>
(function(){
  var btn=document.getElementById('hamburgerBtn2');
  var drawer=document.getElementById('mobileDrawer2');
  var overlay=document.getElementById('drawerOverlay2');
  var closeBtn=document.getElementById('drawerClose2');
  if(!btn||!drawer)return;
  function openD(){drawer.classList.add('open');overlay.classList.add('open');btn.classList.add('open');document.body.style.overflow='hidden';}
  function closeD(){drawer.classList.remove('open');overlay.classList.remove('open');btn.classList.remove('open');document.body.style.overflow='';}
  btn.addEventListener('click',openD);
  closeBtn.addEventListener('click',closeD);
  overlay.addEventListener('click',closeD);
})();
// Video background fallback
(function(){
  var bgStack=document.getElementById('bgStack');
  if(!bgStack)return;
  var vid=document.createElement('video');
  vid.src='./background/Background-Desktop.mp4';
  vid.autoplay=true;vid.muted=true;vid.loop=true;vid.playsInline=true;
  vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.40;';
  vid.addEventListener('canplay',function(){bgStack.querySelector('.bg-img').style.display='none';bgStack.appendChild(vid);},{once:true});
  vid.load();
})();
</script>

<button class="theme-toggle" id="themeToggle" aria-label="Toggle light/dark mode">
  <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
</button>
<script>
// Theme
(function(){
  var btn=document.getElementById('themeToggle');
  if(localStorage.getItem('ayr-theme')==='light')document.documentElement.classList.add('light-mode');
  if(btn)btn.addEventListener('click',function(){
    document.documentElement.classList.toggle('light-mode');
    localStorage.setItem('ayr-theme',document.documentElement.classList.contains('light-mode')?'light':'dark');
  });
})();
</script>




</body>
</html>
