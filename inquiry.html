<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AYR TGW Solutions | Rapid Inquiry</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
/* ── GLOBAL FONT OVERRIDE ── */
@font-face {
  font-family: 'YD Yoonche Bold';
  src: local('YD Yoonche Bold'), local('YDYooncheBold');
}
* {
  font-family: 'YD Yoonche Bold', 'Inter', system-ui, sans-serif !important;
}

.bg-stack{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-stack .bg-img{position:absolute;inset:0;background-image:url('./background/Background-Desktop.png');background-size:cover;background-position:center top;background-repeat:no-repeat;opacity:.50;}
.bg-stack .bg-overlay{position:absolute;inset:0;background-image:url('./background/Overlay-Dark-Desktop.png');background-size:cover;background-position:center;background-repeat:no-repeat;opacity:.85;}
.glow-bloom{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle at 50% 0%,rgba(30,64,175,0.18) 0%,rgba(3,7,18,0) 65%);}

@media(max-width:767px){
  .bg-stack .bg-img{background-image:url('./background/Background-Mobile.png');opacity:.40;}
  .bg-stack .bg-overlay{background-image:url('./background/Overlay-Dark-Mobile.png');opacity:.90;}
}

.nav-link-item { position: relative; padding: 0.5rem 0.75rem; color: #d1d5db; transition: all 0.2s ease; font-weight: 500; }
.nav-link-item:hover { color: #ffffff; }
.nav-link-item.active-tab { color: #3b82f6; font-weight: 700; border-bottom: 2px solid #3b82f6; }

#mobileDrawer2{position:fixed;top:0;right:-300px;width:300px;height:100vh;background-color:#0b1329;z-index:50;transition:transform .3s cubic-bezier(0.4,0,0.2,1);box-shadow:-10px 0 30px rgba(0,0,0,0.5);}
#mobileDrawer2.open{transform:translateX(-300px);}
#drawerOverlay2{position:fixed;inset:0;background-color:rgba(3,7,18,0.6);backdrop-filter:blur(4px);z-index:40;display:none;}
#drawerOverlay2.open{display:block;}

html.light-mode body { background-color: #f3f4f6 !important; color: #1f2937 !important; }
html.light-mode .bg-stack .bg-overlay { background-color: rgba(243, 244, 246, 0.85) !important; background-image: none !important; }
html.light-mode header { background-color: rgba(255, 255, 255, 0.9) !important; border-bottom-color: #e5e7eb !important; }
html.light-mode header a, html.light-mode header button { color: #4b5563 !important; }
html.light-mode header .nav-link-item:hover { color: #111827 !important; }
html.light-mode header .active-tab { color: #2563eb !important; border-bottom-color: #2563eb !important; }
html.light-mode .form-container { background: #ffffff !important; border-color: #e5e7eb !important; color: #1f2937 !important; box-shadow: 0 10px 25px rgba(0,0,0,0.05) !important; }
html.light-mode label, html.light-mode h2, html.light-mode p { color: #111827 !important; }
html.light-mode input, html.light-mode select, html.light-mode textarea { background-color: #f9fafb !important; border-color: #d1d5db !important; color: #111827 !important; }
html.light-mode #mobileDrawer2 { background-color: #ffffff !important; color: #111827 !important; }
</style>
</head>
<body class="bg-[#030712] text-gray-100 min-h-screen relative overflow-x-hidden font-['Inter']">

<div class="bg-stack" id="bgStack"><div class="bg-img"></div><div class="bg-overlay"></div></div>
<div class="glow-bloom"></div>

<header class="relative z-10 flex items-center justify-between px-6 py-4 border-b border-white/10 bg-black/20 backdrop-blur-md">
  <div class="flex items-center gap-3">
    <a href="index.html" class="text-xl font-extrabold tracking-wider bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">AYR TGW Solutions</a>
  </div>
  
  <nav class="hidden md:flex items-center gap-2 text-sm font-medium">
    <a href="index.html" class="nav-link-item">Home</a>
    <a href="clients.html" class="nav-link-item">Client</a>
    <a href="partners.html" class="nav-link-item">Partner</a>
    <a href="inquiry.html" class="nav-link-item active-tab">Inquiry</a>
    <a href="session-feedback.html" class="nav-link-item">Session</a>
    <a href="service-feedback.html" class="nav-link-item">Service</a>
    <a href="agents.html" class="nav-link-item">Agent</a>
  </nav>

  <button id="hamburgerBtn2" class="md:hidden text-gray-300 hover:text-white focus:outline-none">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
</header>

<div id="drawerOverlay2"></div>
<div id="mobileDrawer2" class="flex flex-col p-6 space-y-4">
  <button id="drawerClose2" class="self-end text-gray-400 hover:text-white text-2xl">&times;</button>
  <a href="index.html" class="text-gray-300 hover:text-white py-1 border-b border-white/5">Home</a>
  <a href="clients.html" class="text-gray-300 hover:text-white py-1 border-b border-white/5">Client Onboarding</a>
  <a href="partners.html" class="text-gray-300 hover:text-white py-1 border-b border-white/5">Partner Registration</a>
  <a href="inquiry.html" class="text-blue-400 font-bold py-1 border-b border-white/5">Rapid Inquiry</a>
  <a href="session-feedback.html" class="text-gray-300 hover:text-white py-1 border-b border-white/5">Session Feedback</a>
  <a href="service-feedback.html" class="text-gray-300 hover:text-white py-1 border-b border-white/5">Service Feedback</a>
  <a href="agents.html" class="text-gray-300 hover:text-white py-1 border-b border-white/5">Agent Portal</a>
</div>

<main class="relative z-10 max-w-2xl mx-auto px-4 py-12">
  <div class="form-container bg-white/5 border border-white/10 rounded-2xl p-8 backdrop-blur-xl shadow-2xl">
    <div class="mb-8 text-center">
      <h2 class="text-3xl font-extrabold text-white tracking-tight mb-2">Rapid Operational Inquiry</h2>
      <p class="text-gray-400 text-sm">Direct communications interface. Data packets are routed automatically within corporate networks.</p>
    </div>

    <form id="inquiryForm" class="space-y-6" onsubmit="handleFormSubmit(event)">
      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Requester / Subject Name</label>
        <input type="text" required class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors">
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Return Address Email</label>
        <input type="email" required class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors">
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Functional Classification Category</label>
        <select class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors">
          <option value="general">General Operations System Inquiry</option>
          <option value="technical">Ecosystem Interface Technical Support</option>
          <option value="consulting">Strategic Management Advisory</option>
          <option value="escalation">Administrative Executive Review</option>
        </select>
      </div>

      <div>
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Inquiry Narrative Body</label>
        <textarea rows="5" required class="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="Input details here..."></textarea>
      </div>

      <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all flex items-center justify-center gap-2 cursor-pointer">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2 11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send Inquiry
      </button>
    </form>
  </div>
</main>

<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 font-medium flex items-center gap-2 text-sm"></div>

<button id="themeToggle" class="fixed-theme-btn" aria-label="Toggle Theme">
  <svg id="themeIcon" style="width:22px;height:22px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
    <path id="themeIconPath" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"/>
  </svg>
</button>

<style>
.fixed-theme-btn { position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;width:48px;height:48px;border-radius:50%;background:#ffffff;color:#111827;border:1px solid #e5e7eb;box-shadow:0 10px 25px rgba(0,0,0,0.3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease; }
</style>

<script>
function showToast(m,type='success'){
  var t=document.getElementById('toast'); t.textContent=m;
  if(type==='error'){t.style.backgroundColor='#ef4444';}else{t.style.backgroundColor='#10b981';}
  t.classList.remove('translate-y-20','opacity-0');
  setTimeout(()=>{t.classList.add('translate-y-20','opacity-0');},3000);
}

async function handleFormSubmit(e){
  e.preventDefault();
  var btn=document.getElementById('submitBtn'); btn.disabled=true;
  btn.innerHTML='<svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Routing...';
  try{
    await new Promise(r=>setTimeout(r,1200));
    showToast('Inquiry transmission dispatched to corporate systems hub.');
    document.getElementById('inquiryForm').reset();
    btn.disabled=false;
    btn.innerHTML='<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2 11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send Inquiry';
  }catch(e){
    showToast('Error: '+e.message,'error');
    btn.disabled=false;
    btn.innerHTML='<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M22 2 11 13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send Inquiry';
  }
}

(function(){
  var btn=document.getElementById('hamburgerBtn2');
  var drawer=document.getElementById('mobileDrawer2');
  var overlay=document.getElementById('drawerOverlay2');
  var closeBtn=document.getElementById('drawerClose2');
  if(!btn||!drawer)return;
  btn.addEventListener('click',()=> { drawer.classList.add('open'); overlay.classList.add('open'); });
  closeBtn.addEventListener('click',()=> { drawer.classList.remove('open'); overlay.classList.remove('open'); });
  overlay.addEventListener('click',()=> { drawer.classList.remove('open'); overlay.classList.remove('open'); });

  // Floating Switch State Sync
  const toggleBtn = document.getElementById('themeToggle');
  const htmlEl = document.documentElement;
  const iconPath = document.getElementById('themeIconPath');
  const sunPath = "M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z";
  const moonPath = "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z";

  function applyTheme(theme) {
    if (theme === 'light') {
      htmlEl.classList.add('light-mode');
      if (iconPath) iconPath.setAttribute('d', moonPath);
      if (toggleBtn) { toggleBtn.style.backgroundColor = '#1f2937'; toggleBtn.style.color = '#f59e0b'; toggleBtn.style.borderColor = '#374151'; }
    } else {
      htmlEl.classList.remove('light-mode');
      if (iconPath) iconPath.setAttribute('d', sunPath);
      if (toggleBtn) { toggleBtn.style.backgroundColor = '#ffffff'; toggleBtn.style.color = '#111827'; toggleBtn.style.borderColor = '#e5e7eb'; }
    }
  }
  let currentTheme = localStorage.getItem('theme') || 'dark';
  applyTheme(currentTheme);
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      let nextTheme = htmlEl.classList.contains('light-mode') ? 'dark' : 'light';
      localStorage.setItem('theme', nextTheme);
      applyTheme(nextTheme);
    });
  }
})();

(function(){
  var bgStack=document.getElementById('bgStack'); if(!bgStack)return;
  var vid=document.createElement('video');
  vid.src='./background/Background-Desktop.mp4'; vid.autoplay=true; vid.muted=true; vid.loop=true; vid.playsInline=true;
  vid.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.40;';
  vid.addEventListener('canplay',()=> {
    if(bgStack.querySelector('.bg-img')) bgStack.querySelector('.bg-img').style.display='none';
    bgStack.appendChild(vid);
  },{ once:true });
  vid.load();
})();
</script>
</body>
</html>
