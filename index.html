<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYR TGW Solutions Workspace</title>
    <style>
        :root {
            --bg-image: url('./light.png');
            --brand-blue: #0052cc;
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-card: rgba(255, 255, 255, 0.23);
            --glass-border: rgba(0, 82, 204, 0.15);
        }
        [data-theme="dark"] {
            --bg-image: url('./dark.png');
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-card: rgba(15, 23, 42, 0.28);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--brand-blue); transition: 0.3s ease; }
        body { background: var(--bg-image) no-repeat center center fixed; background-size: cover; min-height: 100vh; padding: 2rem; }

        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .nav-btn { background: var(--glass-card); backdrop-filter: blur(10px); padding: 1rem 2rem; border-radius: 12px; border: 1px solid var(--glass-border); cursor: pointer; font-weight: 700; }
        
        main { max-width: 1200px; margin: 4rem auto; }
        .tool-row-node { display: flex; gap: 2rem; flex-wrap: wrap; }
        
        .floating-window-overlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .floating-window-overlay.active { display: flex; }
        .window-wrapper { width: 90%; max-width: 700px; background: var(--glass-card); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 20px; }
        
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 1.5rem; }
        .tool-link-btn { padding: 1rem; background: rgba(255,255,255,0.4); border: 1px solid var(--glass-border); border-radius: 10px; text-decoration: none; color: var(--brand-blue); text-align: center; font-weight: 600; display: block; }
        .tool-link-btn:hover { background: var(--brand-blue); color: white !important; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">AYR TGW SOLUTIONS</div>
        <button class="nav-btn" onclick="toggleExternalHub(true)">External Links</button>
    </header>

    <main>
        <div class="tool-row-node">
            </div>
    </main>

    <div class="floating-window-overlay" id="externalHubOverlay">
        <div class="window-wrapper">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                <h2 style="font-weight:700;">External Tools Hub</h2>
                <button class="nav-btn" style="padding:0.5rem 1rem;" onclick="toggleExternalHub(false)">Close</button>
            </div>
            
            <div class="tool-grid">
                <a href="https://financial-calculators.ca/#/" target="_blank" class="tool-link-btn">Financial Calculator</a>
                <a href="https://ycharts.com" target="_blank" class="tool-link-btn">YCharts</a>
                <a href="https://koyfin.com" target="_blank" class="tool-link-btn">Koyfin</a>
                <a href="https://fred.stlouisfed.org" target="_blank" class="tool-link-btn">FRED Data</a>
                <a href="https://www.taxtips.ca" target="_blank" class="tool-link-btn">TaxTips.ca</a>
                <a href="https://www.canada.ca/en/revenue-agency.html" target="_blank" class="tool-link-btn">CRA Portal</a>
                <a href="https://calendly.com" target="_blank" class="tool-link-btn">Calendly</a>
                <a href="https://www.docusign.com" target="_blank" class="tool-link-btn">DocuSign</a>
            </div>
        </div>
    </div>

    <script>
        function toggleExternalHub(show) {
            document.getElementById('externalHubOverlay').classList.toggle('active', show);
        }
    </script>
</body>
</html>
