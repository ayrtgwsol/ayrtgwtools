<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYR TGW Tools Hub</title>
    <style>
        /* CSS Variables matching your exact corporate blue and JPEG background assets */
        :root {
            --brand-blue: #0052cc;
            --brand-blue-hover: #0041a3;
            --bg-image: url('./light.jpg');
            --text-color: #1a1a1a;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(0, 82, 204, 0.15);
            --header-bg: rgba(255, 255, 255, 0.9);
            --footer-bg: rgba(255, 255, 255, 0.95);
            --shadow: rgba(0, 0, 0, 0.06);
            --card-shadow: rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --bg-image: url('./dark.jpg');
            --text-color: #ffffff;
            --card-bg: rgba(20, 20, 23, 0.85);
            --card-border: rgba(0, 82, 204, 0.35);
            --header-bg: rgba(16, 16, 18, 0.85);
            --footer-bg: rgba(12, 12, 14, 0.95);
            --shadow: rgba(0, 0, 0, 0.4);
            --card-shadow: rgba(0, 0, 0, 0.25);
        }

        /* Wix-Style Global Layout Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            transition: background 0.4s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body {
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Wix-Style Premium Fixed Navigation Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4rem;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            box-shadow: 0 4px 25px var(--shadow);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 85px;
        }

        .logo-container img {
            height: 52px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        /* Polished Menu Link Buttons */
        .form-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.7rem 1.3rem;
            background-color: var(--brand-blue);
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.88rem;
            letter-spacing: 0.2px;
            border-radius: 4px; /* Clean Wix sharp UI aesthetics */
            box-shadow: 0 2px 8px rgba(0, 82, 204, 0.15);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .form-btn:hover {
            background-color: var(--brand-blue-hover);
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(0, 82, 204, 0.3);
        }

        /* Main Section & Dashboard Layout */
        main {
            flex: 1;
            padding: 9rem 4rem 6rem 4rem; /* Balanced gap spacing beneath fixed header */
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .dashboard-title {
            font-size: 2.4rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 0.6rem;
        }

        .dashboard-subtitle {
            font-size: 1rem;
            opacity: 0.65;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Dynamic Deployment Grid System */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        /* Premium Application Dynamic Component Cards */
        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            border-radius: 6px;
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: 0 12px 35px var(--card-shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            border-color: var(--brand-blue);
            box-shadow: 0 18px 40px rgba(0, 82, 204, 0.18);
        }

        .tool-icon {
            width: 58px;
            height: 58px;
            background: rgba(0, 82, 204, 0.08);
            color: var(--brand-blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        [data-theme="dark"] .tool-icon {
            background: rgba(0, 82, 204, 0.25);
            color: #ffffff;
        }

        .tool-icon svg {
            width: 26px;
            height: 26px;
            fill: currentColor;
        }

        .tool-name {
            font-size: 1.35rem;
            font-weight: 500;
            margin-bottom: 2rem;
            letter-spacing: -0.2px;
            text-transform: capitalize;
        }

        .launch-btn {
            width: 100%;
            padding: 0.8rem;
            background-color: transparent;
            border: 1.5px solid var(--brand-blue);
            color: var(--brand-blue);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        [data-theme="dark"] .launch-btn {
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.25);
        }

        .launch-btn:hover {
            background-color: var(--brand-blue) !important;
            border-color: var(--brand-blue) !important;
            color: #ffffff !important;
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.2);
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.1rem;
            padding: 5rem;
            opacity: 0.5;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        /* Wix-Style Anchor Footer Layout */
        footer {
            padding: 2.2rem 4rem;
            background: var(--footer-bg);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: auto;
            box-shadow: 0 -4px 25px var(--shadow);
            z-index: 900;
        }

        .motto {
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--brand-blue);
            opacity: 0.95;
            text-align: center;
        }

        /* Modern Toggle Switch Shell */
        .theme-toggle-container {
            position: fixed;
            bottom: 1.5rem;
            right: 2rem;
            z-index: 2000;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e4e4e7;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 30px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.06);
        }

        [data-theme="dark"] .slider {
            background-color: #27272a;
            border-color: rgba(255,255,255,0.05);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: #ffffff;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        input:checked + .slider {
            background-color: var(--brand-blue);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        /* High-Fidelity Mobile Responsive Scaling */
        @media (max-width: 900px) {
            header { padding: 0 2rem; }
            main { padding: 9rem 2rem 5rem 2rem; }
            footer { padding: 2rem; }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                height: auto;
                padding: 1.5rem 1rem;
                position: relative;
            }
            main {
                padding-top: 2.5rem;
            }
            .nav-buttons {
                width: 100%;
                flex-direction: column;
                gap: 0.6rem;
                margin-top: 1.2rem;
            }
            .form-btn {
                width: 100%;
                justify-content: center;
            }
            .motto {
                font-size: 0.85rem;
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="./Logo2.png" alt="AYR TGW Solutions">
        </div>
        <nav class="nav-buttons">
            <a href="https://forms.gle/qD4b8aAvsNsw3R8x6" target="_blank" class="form-btn">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-3-8-3z"/></svg>
                Clients Form
            </a>
            <a href="https://forms.gle/iZ4bZfq4rwQCZMQm7" target="_blank" class="form-btn">
                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                Partners Form
            </a>
            <a href="https://forms.gle/8qiENB9tPN7QneCD6" target="_blank" class="form-btn">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                Inquiry Form
            </a>
        </nav>
    </header>

    <main>
        <div class="dashboard-header">
            <h2 class="dashboard-title">Operational Tool Suite</h2>
            <p class="dashboard-subtitle">AYR TGW Solutions Workspace</p>
        </div>
        
        <div class="tools-grid" id="toolsGrid">
            <div class="status-msg" id="statusMessage">Scanning repository for functional codebases...</div>
        </div>
    </main>

    <footer>
        <div class="motto">Trust &bull; Growth &bull; Wealth</div>
    </footer>

    <div class="theme-toggle-container">
        <label class="switch">
            <input type="checkbox" id="themeCheckbox">
            <span class="slider"></span>
        </label>
    </div>

    <script>
        const REPO_OWNER = 'ayrtgwsol';
        const REPO_NAME = 'ayrtgwtools';
        const TARGET_FOLDER = 'tool';

        async function summonRepositoryTools() {
            const grid = document.getElementById('toolsGrid');
            const statusMsg = document.getElementById('statusMessage');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${TARGET_FOLDER}`);
                
                if (!response.ok) {
                    throw new Error(`Directory scanner returned status code: ${response.status}`);
                }

                const contents = await response.json();
                
                const operationalTools = contents.filter(item => 
                    item.type === 'file' && (item.name.endsWith('.html') || item.name.endsWith('.htm'))
                );

                if (operationalTools.length === 0) {
                    statusMsg.textContent = "The deployment engine completed its scan. The 'tool' directory is currently empty.";
                    return;
                }

                statusMsg.remove();

                operationalTools.forEach(tool => {
                    const card = document.createElement('div');
                    card.className = 'tool-card';

                    let cleanName = tool.name.replace(/\.[^/.]+$/, "") 
                                             .replace(/[-_]/g, " ");   
                    
                    const livePath = `${TARGET_FOLDER}/${tool.name}`;

                    card.innerHTML = `
                        <div class="tool-icon">
                            <svg viewBox="0 0 24 24"><path d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L7.6 4.6 4.6 7.6 1.7 4.7C.6 7.1 1 10.1 3 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.4-.4.4-1.1 0-1.4z"/></svg>
                        </div>
                        <div class="tool-name">${cleanName}</div>
                        <a href="${livePath}" class="launch-btn">Launch Framework</a>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Critical core runtime error during sync execution:", error);
                statusMsg.textContent = "Unable to process dynamic assets automatically. Create a folder named 'tool' and push your HTML codes inside it.";
            }
        }

        // --- Theme Engine Switcher ---
        const themeCheckbox = document.getElementById('themeCheckbox');
        const cachedPreference = localStorage.getItem('ayr-theme-preference');
        const defaultToDark = cachedPreference === 'dark' || (!cachedPreference && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (defaultToDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeCheckbox.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            themeCheckbox.checked = false;
        }

        themeCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('ayr-theme-preference', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('ayr-theme-preference', 'light');
            }
        });

        document.addEventListener('DOMContentLoaded', summonRepositoryTools);
    </script>
</body>
</html>
