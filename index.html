<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYR TGW Tools Workspace</title>
    <style>
        :root {
            --bg-image: url('light.jpg');
            --text-color: #0052cc;
            --card-bg: rgba(255, 255, 255, 0.45);
            --card-border: rgba(255, 255, 255, 0.4);
            --shadow-color: rgba(0, 82, 204, 0.1);
            --nav-bg: rgba(255, 255, 255, 0.6);
            --btn-bg: #0052cc;
            --btn-text: #ffffff;
            --modal-overlay: rgba(0, 10, 30, 0.3);
        }

        [data-theme="dark"] {
            --bg-image: url('dark.jpg');
            --text-color: #ffffff;
            --card-bg: rgba(15, 23, 42, 0.45);
            --card-border: rgba(255, 255, 255, 0.1);
            --shadow-color: rgba(0, 0, 0, 0.4);
            --nav-bg: rgba(15, 23, 42, 0.7);
            --btn-bg: #ffffff;
            --btn-text: #0052cc;
            --modal-overlay: rgba(0, 0, 0, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Top Navigation Header Bar */
        header {
            width: 100%;
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .logo-container img {
            height: 40px;
            display: block;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .external-links {
            display: flex;
            gap: 0.75rem;
        }

        .nav-btn {
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 4px 12px var(--shadow-color);
        }

        /* --- Crescent Moon Theme Engine Toggle --- */
        .theme-toggle-wrapper {
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .moon-element {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: transparent;
            box-shadow: -6px 6px 0 0 var(--text-color);
            transform: rotate(-25deg);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s ease;
        }

        [data-theme="dark"] .moon-element {
            transform: rotate(155deg) scale(0.9);
            box-shadow: -8px 4px 0 0 #f1c40f;
        }

        /* Main Workspace Hub Grid */
        main {
            margin-top: 100px;
            flex: 1;
            padding: 3rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .hero-subtitle {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-color);
            opacity: 0.8;
            font-weight: 600;
        }

        .tools-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 1rem;
        }

        /* Glassmorphism Interactive Cards */
        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 240px;
            box-shadow: 0 8px 32px var(--shadow-color);
        }

        .tool-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: var(--text-color);
        }

        .tool-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 1.5rem;
        }

        .launch-btn {
            width: 100%;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: 1px solid var(--card-border);
            padding: 0.75rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
        }

        /* --- Floating Window Overlay (Modal Interface) --- */
        .floating-window-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--modal-overlay);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .floating-window-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .window-wrapper {
            width: 90%;
            max-width: 650px;
            height: 80vh;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .floating-window-overlay.active .window-wrapper {
            transform: scale(1);
        }

        .window-header {
            padding: 1rem 1.5rem;
            background: rgba(0, 0, 0, 0.05);
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .window-title {
            font-weight: 700;
            color: var(--text-color);
        }

        .close-window-btn {
            background: transparent;
            border: none;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-window-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .window-body-frame {
            flex: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* Branding Footer Placement */
        footer {
            width: 100%;
            padding: 2rem;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-color);
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="Logo2.png" alt="AYR TGW Solutions Logo">
        </div>
        <div class="nav-actions">
            <div class="external-links">
                <a href="#" class="nav-btn">Clients Form</a>
                <a href="#" class="nav-btn">Partners Form</a>
                <a href="#" class="nav-btn">Inquiry Form</a>
            </div>
            <div class="theme-toggle-wrapper" id="themeEngineToggle" title="Toggle System Theme Interface">
                <div class="moon-element"></div>
            </div>
        </div>
    </header>

    <main>
        <div class="hero-section">
            <h1 class="hero-title">Operational Tool Suite</h1>
            <h2 class="hero-subtitle">AYR TGW Solutions Workspace</h2>
        </div>

        <div class="tools-grid" id="toolsDisplayMatrix">
            <div class="tool-card">
                <div class="tool-icon">🔄</div>
                <div class="tool-name">Rotate Tool</div>
                <button class="launch-btn" onclick="launchFloatingTool('tool/rotate-tool.html', 'Rotation Vector Framework')">Launch Framework</button>
            </div>
        </div>
    </main>

    <footer>
        Trust • Growth • Wealth
    </footer>

    <div class="floating-window-overlay" id="globalAppOverlay">
        <div class="window-wrapper">
            <div class="window-header">
                <span class="window-title" id="globalAppTitle">Tool Instance Workspace</span>
                <button class="close-window-btn" onclick="terminateFloatingTool()" aria-label="Close interface window">×</button>
            </div>
            <iframe class="window-body-frame" id="globalAppIframe" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        // Core Storage and Engine System Definitions
        const themeEngineToggle = document.getElementById('themeEngineToggle');
        const rootElement = document.documentElement;
        const globalAppOverlay = document.getElementById('globalAppOverlay');
        const globalAppIframe = document.getElementById('globalAppIframe');
        const globalAppTitle = document.getElementById('globalAppTitle');

        // Theme Toggle Mechanism Implementation
        themeEngineToggle.addEventListener('click', () => {
            const currentInterfaceTheme = rootElement.getAttribute('data-theme');
            const targetInterfaceTheme = currentInterfaceTheme === 'dark' ? 'light' : 'dark';
            
            rootElement.setAttribute('data-theme', targetInterfaceTheme);
            localStorage.setItem('ayr-workspace-theme', targetInterfaceTheme);
            
            // Sync current theme state configuration straight down to active framework tool views inside the matrix frames
            synchronizeChildIframeTheme();
        });

        // Floating App Launcher Controller Matrix Operations
        function launchFloatingTool(applicationPath, applicationLabel) {
            globalAppTitle.textContent = applicationLabel;
            globalAppIframe.src = applicationPath;
            globalAppOverlay.classList.add('active');
            
            // Allow processing cycles to finish before firing contextual state configuration synchronization requests
            setTimeout(synchronizeChildIframeTheme, 150);
        }

        function terminateFloatingTool() {
            globalAppOverlay.classList.remove('active');
            // Flush running engine states inside subframe pipelines immediately to prevent ghost thread execution leaks
            globalAppIframe.src = 'about:blank';
        }

        function synchronizeChildIframeTheme() {
            if (globalAppIframe.contentWindow) {
                const currentSystemActiveTheme = rootElement.getAttribute('data-theme');
                try {
                    globalAppIframe.contentWindow.document.documentElement.setAttribute('data-theme', currentSystemActiveTheme);
                } catch (crossOriginSecurityException) {
                    // Fail gracefully if sandbox headers or security matrices are strict during cross-domain executions
                }
            }
        }

        // Initialize user preferences during page creation lifecycle boots
        window.addEventListener('DOMContentLoaded', () => {
            const preservedUserThemeSelection = localStorage.getItem('ayr-workspace-theme') || 'light';
            rootElement.setAttribute('data-theme', preservedUserThemeSelection);
        });

        // Intercept ESC keyboard strokes to naturally clean up open active modal frames
        window.addEventListener('keydown', (keyboardInputEvent) => {
            if (keyboardInputEvent.key === 'Escape' && globalAppOverlay.classList.contains('active')) {
                terminateFloatingTool();
            }
        });
    </script>
</body>
</html>
