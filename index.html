<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYR TGW Tools</title>
    <style>
        /* Strict single-source brand color scheme from Logo2.png */
        :root {
            --brand-color: #0052cc;
            --bg-image: url('./light.jpg');
            
            /* Glassmorphism Configuration for Light Mode */
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(0, 82, 204, 0.12);
            --glass-shadow: rgba(0, 82, 204, 0.05);
            --card-bg: rgba(255, 255, 255, 0.65);
        }

        [data-theme="dark"] {
            --bg-image: url('./dark.jpg');
            
            /* Glassmorphism Configuration for Dark Mode */
            --glass-bg: rgba(10, 15, 30, 0.45);
            --glass-border: rgba(0, 82, 204, 0.25);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --card-bg: rgba(15, 23, 42, 0.65);
        }

        /* Base Setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--brand-color) !important; /* Force monolithic color match across elements */
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        body {
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Glassmorphic Top Header Navigation Bar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 90px;
        }

        .logo-container img {
            height: 52px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .nav-buttons {
            display: flex;
            gap: 1.2rem;
            align-items: center;
        }

        /* Form Interaction Action Triggers */
        .form-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1.4rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            letter-spacing: 0.3px;
            border-radius: 6px;
            box-shadow: 0 4px 12px var(--glass-shadow);
        }

        .form-btn svg {
            width: 16px;
            height: 16px;
            fill: var(--brand-color);
        }

        .form-btn:hover {
            background: var(--brand-color);
            border-color: var(--brand-color);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 82, 204, 0.25);
        }
        
        /* Invert vector colors explicitly on hover state */
        .form-btn:hover * {
            color: #ffffff !important;
            fill: #ffffff !important;
        }

        /* Dynamic Main Canvas Container Grid spacing */
        main {
            flex: 1;
            padding: 11rem 4rem 7rem 4rem;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 4.5rem;
        }

        .dashboard-title {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
        }

        .dashboard-subtitle {
            font-size: 1rem;
            opacity: 0.8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Tool Grid Matrix */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 2.5rem;
        }

        /* System Grid Application Card Nodes */
        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 12px 40px var(--glass-shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }

        .tool-card:hover {
            transform: translateY(-6px);
            border-color: var(--brand-color);
            box-shadow: 0 20px 40px rgba(0, 82, 204, 0.15);
        }

        .tool-icon {
            width: 64px;
            height: 64px;
            background: rgba(0, 82, 204, 0.06);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            border: 1px solid var(--glass-border);
        }

        .tool-icon svg {
            width: 28px;
            height: 28px;
            fill: var(--brand-color);
        }

        .tool-name {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            letter-spacing: -0.2px;
            text-transform: capitalize;
        }

        .launch-btn {
            width: 100%;
            padding: 0.85rem;
            background: transparent;
            border: 1.5px solid var(--brand-color);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 6px;
        }

        .launch-btn:hover {
            background: var(--brand-color);
            color: #ffffff !important;
            box-shadow: 0 6px 16px rgba(0, 82, 204, 0.2);
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.15rem;
            padding: 6rem;
            font-style: italic;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.85;
        }

        /* Glassmorphic Base Grounding Footer */
        footer {
            padding: 2.2rem 4rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: auto;
            box-shadow: 0 -8px 32px 0 var(--glass-shadow);
            z-index: 900;
        }

        .motto {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-align: center;
        }

        /* Isolated Floating Theme Switch Widget */
        .theme-toggle-panel {
            position: fixed;
            bottom: 6.5rem; /* Floating safety clear offset above the footer level */
            right: 2.5rem;
            z-index: 2000;
        }

        .theme-btn {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            box-shadow: 0 4px 15px var(--glass-shadow);
        }

        .theme-btn:hover {
            transform: scale(1.08);
            border-color: var(--brand-color);
        }

        .theme-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--brand-color);
        }

        /* Handle Theme Icon State Render Inversions */
        [data-theme="dark"] .sun-icon { display: none; }
        [data-theme="light"] .moon-icon { display: none; }

        /* Responsive UI Optimization Systems */
        @media (max-width: 900px) {
            header { padding: 0 2rem; }
            main { padding: 10rem 2rem 6rem 2rem; }
            footer { padding: 2rem; }
            .theme-toggle-panel { right: 1.5rem; bottom: 6rem; }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                height: auto;
                padding: 1.5rem 1rem;
                position: relative;
            }
            main { padding-top: 3rem; }
            .nav-buttons {
                width: 100%;
                flex-direction: column;
                gap: 0.75rem;
                margin-top: 1.5rem;
            }
            .form-btn { width: 100%; justify-content: center; }
            .motto { font-size: 0.9rem; letter-spacing: 3px; }
            .theme-toggle-panel { bottom: 7.5rem; right: 1rem; }
        }
    </style>
</head>
<body data-theme="light">

    <header>
        <div class="logo-container">
            <img src="./Logo2.png" alt="AYR TGW Solutions">
        </div>
        <nav class="nav-buttons">
            <a href="https://forms.gle/qD4b8aAvsNsw3R8x6" target="_blank" class="form-btn">
                <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-3-8-3z"/></svg>
                Clients Form
            </a>
            <a href="https://forms.gle/iZ4bZfq4rwQCZMQm7" target="_blank" class="form-btn">
                <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                Partners Form
            </a>
            <a href="https://forms.gle/8qiENB9tPN7QneCD6" target="_blank" class="form-btn">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                Inquiry Form
            </a>
        </nav>
    </header>

    <main>
        <div class="dashboard-header">
            <h2 class="dashboard-title">Operational Tool Suite</h2>
            <p class="dashboard-subtitle">AYR TGW Solutions Workspace</p>
        </div>
        
        <div class="tools-grid" id="toolsGrid">
            <div class="status-msg" id="statusMessage">Scanning repository for functional codebases...</div>
        </div>
    </main>

    <footer>
        <div class="motto">Trust &bull; Growth &bull; Wealth</div>
    </footer>

    <div class="theme-toggle-panel">
        <button class="theme-btn" id="themeEngineToggle" aria-label="Toggle Custom Visual Theme">
            <svg class="sun-icon" viewBox="0 0 24 24">
                <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zM7.05 18.01l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41s-1.02-.39-1.41 0z"/>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24">
                <path d="M12.3 22h-.1c-5.5 0-10-4.5-10-10 0-4.8 3.5-8.9 8.2-9.8.6-.1 1.2.3 1.3.9.1.6-.3 1.2-.9 1.3-3.5.7-6 3.7-6 7.6 0 4.4 3.6 8 8 8 3.9 0 6.9-2.5 7.6-6 .1-.6.7-1 1.3-.9.6.1 1 .7.9 1.3-.9 4.7-5 8.2-9.8 8.2z"/>
            </svg>
        </button>
    </div>

    <script>
        const REPO_OWNER = 'ayrtgwsol';
        const REPO_NAME = 'ayrtgwtools';
        const TARGET_FOLDER = 'tool';

        // Scans folder tree configurations for available internal programs
        async function summonRepositoryTools() {
            const grid = document.getElementById('toolsGrid');
            const statusMsg = document.getElementById('statusMessage');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${TARGET_FOLDER}`);
                if (!response.ok) throw new Error();

                const contents = await response.json();
                const operationalTools = contents.filter(item => 
                    item.type === 'file' && (item.name.endsWith('.html') || item.name.endsWith('.htm'))
                );

                if (operationalTools.length === 0) {
                    statusMsg.textContent = "Unable to process dynamic assets automatically. Create a folder named 'tool' and push your HTML codes inside it.";
                    return;
                }

                statusMsg.remove();

                operationalTools.forEach(tool => {
                    const card = document.createElement('div');
                    card.className = 'tool-card';
                    let cleanName = tool.name.replace(/\.[^/.]+$/, "").replace(/[-_]/g, " ");   
                    const livePath = `${TARGET_FOLDER}/${tool.name}`;

                    card.innerHTML = `
                        <div class="tool-icon">
                            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                        </div>
                        <div class="tool-name">${cleanName}</div>
                        <a href="${livePath}" class="launch-btn">Launch Framework</a>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                statusMsg.textContent = "Unable to process dynamic assets automatically. Create a folder named 'tool' and push your HTML codes inside it.";
            }
        }

        // Automated Theme Engine Control Synchronization
        const toggleButton = document.getElementById('themeEngineToggle');
        const rootElement = document.documentElement;
        
        function applyInterfaceTheme(targetTheme) {
            rootElement.setAttribute('data-theme', targetTheme);
            document.body.setAttribute('data-theme', targetTheme);
            localStorage.setItem('ayr-theme-preference', targetTheme);
        }

        const cachedPreference = localStorage.getItem('ayr-theme-preference');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (cachedPreference) {
            applyInterfaceTheme(cachedPreference);
        } else {
            applyInterfaceTheme(systemPrefersDark ? 'dark' : 'light');
        }

        toggleButton.addEventListener('click', () => {
            const currentActive = rootElement.getAttribute('data-theme');
            applyInterfaceTheme(currentActive === 'dark' ? 'light' : 'dark');
        });

        document.addEventListener('DOMContentLoaded', summonRepositoryTools);
    </script>
</body>
</html>
