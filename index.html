<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYR TGW Workspace</title>
    <style>
        /* [Global CSS remains consistent with your design] */
        :root { --glass-bg: rgba(255, 255, 255, 0.35); --glass-card: rgba(255, 255, 255, 0.23); --brand-blue: #0052cc; --glass-border: rgba(0, 82, 204, 0.15); }
        body { background: #f0f4f8; min-height: 100vh; font-family: sans-serif; }
        .header { display: flex; justify-content: space-between; padding: 2rem; align-items: center; }
        .nav-btn { background: rgba(255,255,255,0.5); padding: 1rem 2rem; border-radius: 12px; border: 1px solid var(--glass-border); cursor: pointer; font-weight: bold; }
        
        .floating-window-overlay { position: fixed; top:0; left:0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 1000; }
        .floating-window-overlay.active { display: flex; }
        .window-wrapper { width: 90%; max-width: 800px; background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 1rem; }
        .tool-link-btn { padding: 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; text-decoration: none; color: #334155; text-align: center; font-weight: 600; display: block; }
        .tool-link-btn:hover { background: #eff6ff; border-color: var(--brand-blue); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">AYR TGW SOLUTIONS</div>
        <button class="nav-btn" onclick="toggleExternalHub(true)">External Links</button>
    </header>

    <div class="floating-window-overlay" id="externalHubOverlay">
        <div class="window-wrapper">
            <div style="display:flex; justify-content:space-between; margin-bottom:2rem;">
                <h2>External Tools Hub</h2>
                <button onclick="toggleExternalHub(false)">Close</button>
            </div>
            
            <div class="tool-grid">
                <a href="https://financial-calculators.ca/#/" target="_blank" class="tool-link-btn">Financial Calculator</a>
                <a href="https://ycharts.com" target="_blank" class="tool-link-btn">YCharts</a>
                <a href="https://koyfin.com" target="_blank" class="tool-link-btn">Koyfin</a>
                <a href="https://fred.stlouisfed.org" target="_blank" class="tool-link-btn">FRED Data</a>
                <a href="https://www.taxtips.ca" target="_blank" class="tool-link-btn">TaxTips.ca</a>
                <a href="https://www.canada.ca/en/revenue-agency.html" target="_blank" class="tool-link-btn">CRA Portal</a>
                <a href="https://calendly.com" target="_blank" class="tool-link-btn">Calendly</a>
                <a href="https://www.docusign.com" target="_blank" class="tool-link-btn">DocuSign</a>
            </div>
        </div>
    </div>

    <script>
        function toggleExternalHub(show) {
            document.getElementById('externalHubOverlay').classList.toggle('active', show);
        }
    </script>
</body>
</html>
