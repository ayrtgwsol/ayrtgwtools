<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYR TGW Tools Workspace</title>
    <style>
        :root {
            --bg-image: url('./light.png');
            --brand-blue: #0052cc;
            --edge-gap: 24px;
            --max-bound: 1400px;
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-card: rgba(255, 255, 255, 0.23);
            --glass-btn: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(0, 82, 204, 0.15);
            --shadow-color: rgba(0, 82, 204, 0.06);
            --modal-overlay: rgba(0, 10, 30, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; color: var(--brand-blue) !important; transition: 0.3s ease; }
        body { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg-image) no-repeat center center fixed; background-size: cover; padding: 0 var(--edge-gap); }
        body.modal-lock { overflow: hidden !important; }

        header { width: 100%; max-width: var(--max-bound); background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 0 2.5rem; display: flex; justify-content: space-between; align-items: center; position: fixed; top: var(--edge-gap); left: 50%; transform: translateX(-50%); z-index: 100; height: 80px; box-shadow: 0 10px 30px var(--shadow-color); }
        .logo-container img { height: 42px; cursor: pointer; }
        .external-links { display: flex; gap: 1rem; }
        .nav-btn { background: var(--glass-btn); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 0.6rem 1.4rem; border-radius: 10px; font-weight: 600; cursor: pointer; text-decoration: none; }

        main { margin-top: 150px; flex: 1; display: flex; flex-direction: column; align-items: center; }
        .tools-column-pipeline { width: 100%; max-width: var(--max-bound); display: flex; flex-direction: column; gap: 5rem; }
        
        /* Left-Side Alignment for Proprietary Pipeline */
        .tool-row-node { display: flex; width: 100%; align-items: center; justify-content: flex-start; }
        .tool-card { background: var(--glass-card); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 12px 35px var(--shadow-color); }
        .tool-name { font-size: 1.6rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1.5rem; text-align: center; }
        .launch-btn { width: 100%; background: var(--glass-btn); border: 1px solid var(--glass-border); padding: 1rem; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; text-align: center; text-decoration: none; display: block; }

        /* Floating Hub Styles */
        .floating-window-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--modal-overlay); backdrop-filter: blur(12px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .floating-window-overlay.active { display: flex; }
        .window-wrapper { width: 90%; max-width: 700px; max-height: 80vh; background: var(--glass-card); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem; overflow-y: auto; }
        .tool-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 1.5rem; }
        .tool-link-btn { padding: 1rem; background: var(--glass-btn); border: 1px solid var(--glass-border); border-radius: 10px; text-decoration: none; color: var(--brand-blue); text-align: center; font-weight: 600; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container"><img src="./Logo2.png" alt="Logo"></div>
        <div class="external-links">
            <a href="#" class="nav-btn">Clients Form</a>
            <a href="#" class="nav-btn">Partners Form</a>
            <a href="#" class="nav-btn">Admin Form</a>
        </div>
    </header>

    <main>
        <div class="tools-column-pipeline">
            <div class="tool-row-node">
                <div class="tool-card">
                    <div class="tool-name">External Tools</div>
                    <button class="launch-btn" onclick="toggleHub(true)">Open Resource Hub</button>
                </div>
            </div>
        </div>
    </main>

    <div class="floating-window-overlay" id="externalHubOverlay">
        <div class="window-wrapper">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                <h2 style="font-weight:700;">External Resources</h2>
                <button class="nav-btn" onclick="toggleHub(false)">Close</button>
            </div>
            <div class="tool-grid">
                <a href="https://financial-calculators.ca/#/" target="_blank" class="tool-link-btn">Financial Calculator</a>
                <a href="https://ycharts.com" target="_blank" class="tool-link-btn">YCharts</a>
                <a href="https://koyfin.com" target="_blank" class="tool-link-btn">Koyfin</a>
                <a href="https://fred.stlouisfed.org" target="_blank" class="tool-link-btn">FRED Data</a>
                <a href="https://www.taxtips.ca" target="_blank" class="tool-link-btn">TaxTips.ca</a>
                <a href="https://www.canada.ca/en/revenue-agency.html" target="_blank" class="tool-link-btn">CRA Portal</a>
                <a href="https://calendly.com" target="_blank" class="tool-link-btn">Calendly</a>
                <a href="https://www.docusign.com" target="_blank" class="tool-link-btn">DocuSign</a>
            </div>
        </div>
    </div>

    <script>
        function toggleHub(show) {
            document.getElementById('externalHubOverlay').classList.toggle('active', show);
            document.body.classList.toggle('modal-lock', show);
        }
    </script>
</body>
</html>
