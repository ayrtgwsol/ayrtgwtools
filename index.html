<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYR TGW Tools Workspace</title>
    <style>
        /* BRAND IDENTITY MATRIX - PNG ROOT INFRASTRUCTURE */
        :root {
            --bg-image: url('./light.png');
            --brand-blue: #0052cc;
            --edge-gap: 24px;
            --max-bound: 1400px;
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-card: rgba(255, 255, 255, 0.23);
            --glass-btn: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(0, 82, 204, 0.15);
            --shadow-color: rgba(0, 82, 204, 0.06);
            --modal-overlay: rgba(0, 10, 30, 0.15);
        }

        [data-theme="dark"] {
            --bg-image: url('./dark.png');
            --glass-bg: rgba(15, 23, 42, 0.45);
            --glass-card: rgba(15, 23, 42, 0.28);
            --glass-btn: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --shadow-color: rgba(0, 0, 0, 0.35);
            --modal-overlay: rgba(0, 0, 0, 0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: var(--brand-blue) !important;
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, transform 0.3s ease;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow-x: hidden;
            padding-left: var(--edge-gap);
            padding-right: var(--edge-gap);
        }

        body.modal-lock { overflow: hidden !important; height: 100vh !important; }

        header {
            width: 100%;
            max-width: var(--max-bound);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 0 2.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: var(--edge-gap);
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            height: 80px;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        .mobile-menu-trigger { display: none; background: transparent; border: none; cursor: pointer; padding: 0.5rem; flex-direction: column; gap: 6px; z-index: 110; }
        .mobile-menu-trigger span { display: block; width: 26px; height: 2.5px; background-color: var(--brand-blue); border-radius: 2px; }
        
        .logo-container img { height: 42px; cursor: pointer; }
        .external-links { display: flex; gap: 1.2rem; }
        .nav-btn { background: var(--glass-btn); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 0.6rem 1.4rem; border-radius: 10px; font-weight: 600; cursor: pointer; text-decoration: none; }

        .mobile-sidebar { position: fixed; top: 0; left: -300px; width: 280px; height: 100vh; background: var(--glass-card); backdrop-filter: blur(35px); z-index: 95; padding: calc(80px + var(--edge-gap) + 2rem) 1.5rem 2rem 1.5rem; display: flex; flex-direction: column; gap: 1.2rem; transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .mobile-sidebar.open { left: 0; }

        main { margin-top: calc(80px + (var(--edge-gap) * 2) + 2rem); flex: 1; padding: 2rem 0; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .tools-column-pipeline { width: 100%; max-width: var(--max-bound); display: flex; flex-direction: column; gap: 5rem; }
        .tool-row-node { display: flex; width: 100%; align-items: center; box-sizing: border-box; }
        
        .tool-row-node:nth-child(odd) { justify-content: flex-start; }
        .tool-row-node:nth-child(even) { justify-content: flex-end; }

        .tool-card { background: var(--glass-card); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 3rem 2.5rem; width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: 2rem; box-shadow: 0 12px 35px var(--shadow-color); }
        .tool-name { font-size: 1.6rem; font-weight: 700; text-transform: uppercase; text-align: center; }
        .launch-btn { width: 100%; background: var(--glass-btn); border: 1px solid var(--glass-border); padding: 0.9rem; border-radius: 12px; font-weight: 700; cursor: pointer; text-transform: uppercase; }

        .floating-theme-panel { position: fixed; bottom: var(--edge-gap); right: var(--edge-gap); z-index: 999; }
        .glass-toggle-circle { width: 56px; height: 56px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .floating-window-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--modal-overlay); backdrop-filter: blur(12px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; }
        .floating-window-overlay.active { opacity: 1; pointer-events: auto; }
        .window-wrapper { width: 90%; max-width: 750px; height: 80vh; background: var(--glass-card); border: 1px solid var(--glass-border); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; }
        .window-header { padding: 1.2rem 2rem; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .window-body-frame { flex: 1; width: 100%; height: 100%; border: none; background: transparent; }

        footer { width: 100%; max-width: var(--max-bound); padding: 1.8rem; text-align: center; background: var(--glass-bg); border-radius: 20px; margin: auto auto 0 auto; position: relative; z-index: 90; }

        @media (max-width: 768px) {
            .mobile-menu-trigger { display: flex; }
            .external-links { display: none; }
            .tool-card { width: 85%; }
        }
    </style>
</head>
<body>

    <header>
        <button class="mobile-menu-trigger" id="sidebarMenuToggle"><span></span><span></span><span></span></button>
        <div class="logo-container"><img src="./Logo2.png" alt="Logo"></div>
        <div class="external-links">
            <a href="#" class="nav-btn">Clients Form</a>
            <a href="#" class="nav-btn">Partners Form</a>
        </div>
    </header>

    <nav class="mobile-sidebar" id="mobileSidebarMenu">
        <a href="#" class="nav-btn">Clients Form</a>
        <a href="#" class="nav-btn">Partners Form</a>
    </nav>

    <main>
        <div class="tools-column-pipeline">
            
            <div class="tool-row-node">
                <div class="tool-card">
                    <div class="tool-name">Savings Calculator</div>
                    <button class="launch-btn" onclick="launchFloatingTool('./tool/savings-calculator.html', 'Savings Finance Calculator')">Launch Framework</button>
                </div>
            </div>

            <div class="tool-row-node">
                <div class="tool-card">
                    <div class="tool-name">Finance Growth</div>
                    <button class="launch-btn" onclick="launchFloatingTool('./tool/financial-calculator.html', 'Finance Growth Calculator')">Launch Framework</button>
                </div>
            </div>

        </div>
    </main>

    <footer>Trust • Growth • Wealth</footer>

    <div class="floating-theme-panel">
        <button class="glass-toggle-circle" id="themeEngineToggle"></button>
    </div>

    <div class="floating-window-overlay" id="globalAppOverlay">
        <div class="window-wrapper">
            <div class="window-header">
                <span class="window-title" id="globalAppTitle">Tool Workspace</span>
                <button class="close-window-btn" onclick="terminateFloatingTool()">×</button>
            </div>
            <iframe class="window-body-frame" id="globalAppIframe" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        const themeEngineToggle = document.getElementById('themeEngineToggle');
        const rootElement = document.documentElement;
        const globalAppOverlay = document.getElementById('globalAppOverlay');
        const globalAppIframe = document.getElementById('globalAppIframe');
        const sidebarMenuToggle = document.getElementById('sidebarMenuToggle');
        const mobileSidebarMenu = document.getElementById('mobileSidebarMenu');

        sidebarMenuToggle.addEventListener('click', () => {
            mobileSidebarMenu.classList.toggle('open');
        });

        themeEngineToggle.addEventListener('click', () => {
            const nextTheme = rootElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            rootElement.setAttribute('data-theme', nextTheme);
        });

        function launchFloatingTool(path, label) {
            document.getElementById('globalAppTitle').textContent = label;
            globalAppIframe.src = path;
            globalAppOverlay.classList.add('active');
            document.body.classList.add('modal-lock');
        }

        function terminateFloatingTool() {
            globalAppOverlay.classList.remove('active');
            document.body.classList.remove('modal-lock');
            globalAppIframe.src = 'about:blank';
        }
    </script>
</body>
</html>
