<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYR TGW Tools Hub</title>
    <style>
        /* CSS Variables for Brand Colors and Theme Handling */
        :root {
            --brand-blue: #0052cc;
            --brand-blue-hover: #0041a3;
            --bg-image: url('light.png');
            --text-color: #111111;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(0, 82, 204, 0.2);
            --header-bg: rgba(255, 255, 255, 0.9);
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg-image: url('dark.png');
            --text-color: #ffffff;
            --card-bg: rgba(20, 20, 20, 0.75);
            --card-border: rgba(0, 82, 204, 0.4);
            --header-bg: rgba(15, 15, 15, 0.85);
            --shadow: rgba(0, 0, 0, 0.5);
        }

        /* Core Layout Styling */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Layout */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--brand-blue);
            box-shadow: 0 4px 15px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-container img {
            height: 60px;
            width: auto;
            display: block;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .form-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.6rem 1.2rem;
            background-color: var(--brand-blue);
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 6px;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .form-btn:hover {
            background-color: var(--brand-blue-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 82, 204, 0.3);
        }

        /* Main Dashboard & Grid Layout */
        main {
            flex: 1;
            padding: 3rem 5%;
            max-width: 1400px;
            width: 100%;
            margin: 0 auto;
        }

        .dashboard-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--brand-blue);
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
            position: relative;
            padding-bottom: 0.5rem;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        /* Dynamic Tool Cards */
        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 8px 24px var(--shadow);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            border-color: var(--brand-blue);
            box-shadow: 0 12px 30px rgba(0, 82, 204, 0.25);
        }

        .tool-icon {
            font-size: 2.5rem;
            color: var(--brand-blue);
            margin-bottom: 1rem;
        }

        .tool-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            word-break: break-word;
        }

        .launch-btn {
            width: 100%;
            padding: 0.6rem;
            background-color: transparent;
            border: 2px solid var(--brand-blue);
            color: var(--brand-blue);
            text-decoration: none;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        [data-theme="dark"] .launch-btn {
            color: #ffffff;
            border-color: var(--brand-blue);
        }

        .launch-btn:hover {
            background-color: var(--brand-blue);
            color: #ffffff !important;
        }

        /* Status & Error Messages */
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            padding: 3rem;
            font-style: italic;
        }

        /* Footer Layout */
        footer {
            padding: 1.5rem 5%;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--card-border);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .motto {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--brand-blue);
            text-align: center;
        }

        /* Theme Toggle Controls */
        .theme-toggle-container {
            position: fixed;
            bottom: 1.2rem;
            right: 1.5rem;
            z-index: 2000;
            display: flex;
            align-items: center;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 28px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--brand-blue);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        /* Responsive Mobile Architecture */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .nav-buttons {
                width: 100%;
                flex-direction: column;
                gap: 0.5rem;
            }
            .form-btn {
                justify-content: center;
                width: 100%;
            }
            .motto {
                font-size: 0.9rem;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="Logo2.png" alt="AYR TGW Logo">
        </div>
        <nav class="nav-buttons">
            <a href="https://forms.gle/qD4b8aAvsNsw3R8x6" target="_blank" class="form-btn">👤 Clients Form</a>
            <a href="https://forms.gle/iZ4bZfq4rwQCZMQm7" target="_blank" class="form-btn">🤝 Partners Form</a>
            <a href="https://forms.gle/8qiENB9tPN7QneCD6" target="_blank" class="form-btn">📬 Inquiry Form</a>
        </nav>
    </header>

    <main>
        <h2 class="dashboard-title">Operational Tool Suite</h2>
        <div class="tools-grid" id="toolsGrid">
            <div class="status-msg" id="statusMessage">Scanning repository for functional codebases...</div>
        </div>
    </main>

    <footer>
        <div class="motto">Trust &bull; Growth &bull; Wealth</div>
    </footer>

    <div class="theme-toggle-container">
        <label class="switch">
            <input type="checkbox" id="themeCheckbox">
            <span class="slider"></span>
        </label>
    </div>

    <script>
        // --- GitHub API Sync Integration ---
        const REPO_OWNER = 'ayrtgwsol';
        const REPO_NAME = 'ayrtgwtools';
        const TARGET_FOLDER = 'tool';

        async function summonRepositoryTools() {
            const grid = document.getElementById('toolsGrid');
            const statusMsg = document.getElementById('statusMessage');
            
            try {
                // Fetch content structures directly via GitHub's public API endpoint
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${TARGET_FOLDER}`);
                
                if (!response.ok) {
                    throw new Error(`Directory scanner returned status code: ${response.status}`);
                }

                const contents = await response.json();
                
                // Filter out non-HTML assets to only build cards for deployable applications
                const operationalTools = contents.filter(item => 
                    item.type === 'file' && (item.name.endsWith('.html') || item.name.endsWith('.htm'))
                );

                if (operationalTools.length === 0) {
                    statusMsg.textContent = "The deployment engine completed its scan. The 'tool' directory is currently empty.";
                    return;
                }

                // Remove the loading notification to mount tool elements
                statusMsg.remove();

                operationalTools.forEach(tool => {
                    const card = document.createElement('div');
                    card.className = 'tool-card';

                    // Convert file naming formats cleanly into UI text titles
                    let cleanName = tool.name.replace(/\.[^/.]+$/, "") // Strip suffix extensions
                                             .replace(/[-_]/g, " ");   // Swap structural hyphens for spaces
                    
                    // Direct delivery relative path for running scripts on GitHub pages integration
                    const livePath = `${TARGET_FOLDER}/${tool.name}`;

                    card.innerHTML = `
                        <div class="tool-icon">🛠️</div>
                        <div class="tool-name">${cleanName}</div>
                        <a href="${livePath}" class="launch-btn">Launch Framework</a>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error("Critical core runtime error during sync execution:", error);
                statusMsg.textContent = "Unable to process dynamic assets. Please ensure the target folder exists and matches the configuration schema.";
            }
        }

        // --- Dual-Mode Lighting Configuration Logic ---
        const themeCheckbox = document.getElementById('themeCheckbox');
        
        // Match user's local operating system settings if clean state exists
        const cachedPreference = localStorage.getItem('ayr-theme-preference');
        const defaultToDark = cachedPreference === 'dark' || (!cachedPreference && window.matchMedia('(prefers-color-scheme: dark)').matches);

        if (defaultToDark) {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeCheckbox.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            themeCheckbox.checked = false;
        }

        themeCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('ayr-theme-preference', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('ayr-theme-preference', 'light');
            }
        });

        // Initialize components on layout load
        document.addEventListener('DOMContentLoaded', summonRepositoryTools);
    </script>
</body>
</html>
